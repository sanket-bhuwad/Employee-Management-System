<div class="login-page">
	<div class="ambient-shape shape-1"></div>
	<div class="ambient-shape shape-2"></div>

	<mat-card class="login-card">
		<p class="product">PulseHR Enterprise</p>
		<h1>Admin Secure Login</h1>
		<p class="subtitle">Manage workforce data, payroll snapshots, and employee operations.</p>

		<form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
			<mat-form-field appearance="outline" class="w-100">
				<mat-label>Email</mat-label>
				<input matInput type="email" formControlName="email" placeholder="admin@example.com" />
				<mat-error *ngIf="email?.touched && email?.invalid">Enter a valid email</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="w-100">
				<mat-label>Password</mat-label>
				<input matInput type="password" formControlName="password" placeholder="admin123" />
				<mat-error *ngIf="password?.touched && password?.invalid">Password is required</mat-error>
			</mat-form-field>

			<button mat-flat-button color="primary" type="submit" class="w-100">Login</button>
		</form>

		<p class="hint">Sign in with backend `.env` credentials (`ADMIN_EMAIL`, `ADMIN_PASSWORD`).</p>
	</mat-card>
</div>
