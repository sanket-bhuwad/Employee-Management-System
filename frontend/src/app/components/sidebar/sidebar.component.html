<aside class="sidebar" [class.closed]="!isOpen">
	<div class="sidebar-head">
		<div class="logo-orb">NP</div>
		<div class="logo-text">
			<p class="logo-title">NexaPeople</p>
			<p class="logo-sub">Admin Workspace</p>
		</div>
	</div>

	<p class="menu-label">NAVIGATION</p>

	<nav>
		<a
			routerLink="/dashboard"
			routerLinkActive="active"
			[routerLinkActiveOptions]="{ exact: true }"
			(click)="close()"
		>
			<mat-icon>dashboard</mat-icon>
			<span class="nav-text">Dashboard</span>
		</a>
		<a
			routerLink="/dashboard/employees"
			routerLinkActive="active"
			[routerLinkActiveOptions]="{ exact: true }"
			(click)="close()"
		>
			<mat-icon>groups</mat-icon>
			<span class="nav-text">Employees</span>
		</a>
		<a
			routerLink="/dashboard/employees/new"
			routerLinkActive="active"
			[routerLinkActiveOptions]="{ exact: true }"
			(click)="close()"
		>
			<mat-icon>person_add</mat-icon>
			<span class="nav-text">Add Employee</span>
		</a>
		<a href="javascript:void(0)" (click)="logout()">
			<mat-icon>logout</mat-icon>
			<span class="nav-text">Logout</span>
		</a>
	</nav>

	<div class="sidebar-foot">
		<p class="foot-title">System Status</p>
		<p class="foot-value">Connected</p>
	</div>
</aside>
